<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nextlink Rep Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:     #111111;
      --black2:    #1a1a1a;
      --orange:    #F5A31A;
      --orange-lt: #fff8ee;
      --g50:       #f5f7fa;
      --g100:      #eaecf0;
      --g200:      #d8dde6;
      --g300:      #c0c8d5;
      --g500:      #7c8fa6;
      --g700:      #3d4f63;
      --red:       #ef4444;
      --red-lt:    #fef2f2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fafafa; color: var(--g700); min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────── */
    .hdr { background: var(--black); height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo-circle { width: 32px; height: 32px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0; }
    .logo-text { font-size: 20px; font-weight: 700; color: #fff; font-family: 'DM Sans', sans-serif; }
    .logo-text span { color: var(--orange); }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: 2px; }
    .hdr-btns { display: flex; gap: 8px; }
    .hbtn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); padding: 5px 13px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .hbtn:hover { color: white; background: rgba(255,255,255,0.13); }
    .rep-btn { color: var(--orange); font-weight: 600; border-color: rgba(245,163,26,0.3); background: rgba(245,163,26,0.08); cursor: pointer; }
    .rep-btn:hover { background: rgba(245,163,26,0.15); }

    /* ── Calendar ────────────────────────────────────────── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px 16px 100px; }
    .loading-msg { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--g500); }

    .day { background: white; border-radius: 10px; border: 1px solid var(--g100); overflow: hidden; margin-bottom: 8px; }
    .day.is-today { border-color: var(--orange); border-width: 2px; }
    .day.is-past  { opacity: 0.72; }
    .day.is-empty.is-future { opacity: 0.4; }

    .day-hdr { display: flex; align-items: center; gap: 10px; padding: 6px 14px; border-bottom: 1px solid var(--g100); background: #eceef2; }
    .day-name { font-size: 14px; font-weight: 700; color: var(--black); }
    .day-date { font-size: 11px; color: var(--g500); }
    .today-pill { background: var(--orange); color: var(--black); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .day-count { font-size: 11px; color: var(--g500); margin-left: auto; font-family: 'DM Mono', monospace; }

    .sched-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .sched-table tbody tr { border-bottom: 1px solid rgba(0,0,0,0.04); }
    .sched-table tbody tr:last-child { border-bottom: none; }
    .sched-table tbody tr:hover { background: #fafafa; }
    .sched-table td { padding: 5px 10px; font-size: 13px; vertical-align: middle; border-right: 1px solid rgba(0,0,0,0.04); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sched-table td:last-child { border-right: none; }
    .td-status { width: 110px; }
    .td-name   { font-weight: 600; color: var(--black); }
    .td-plan   { width: 90px; color: var(--g500); font-size: 12px; font-family: 'DM Mono', monospace; }
    .td-rep    { width: 36px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--g500); text-align: center; }

    /* ── Status badges ───────────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .badge-installed  { background: #dcfce7; color: #166534; }
    .badge-scheduled  { background: #dbeafe; color: #1e40af; }
    .badge-cancelled  { background: #fce7f3; color: #9d174d; }
    .badge-failed     { background: #ffedd5; color: #9a3412; }
    .badge-mia        { background: #fef9c3; color: #854d0e; }
    .badge-followup   { background: #ede9fe; color: #4c1d95; }
    .badge-pending    { background: #f3f4f6; color: #374151; }

    /* ── Accounts Drawer ─────────────────────────────────── */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400; display: none; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 14px 14px 0 0; max-height: 82vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; z-index: 401; }
    .drawer-overlay.open .drawer { transform: translateY(0); }
    .drawer-hdr { padding: 16px 16px 10px; border-bottom: 1px solid var(--g100); flex-shrink: 0; }
    .drawer-title { font-size: 15px; font-weight: 700; color: var(--black); display: flex; align-items: center; justify-content: space-between; }
    .drawer-close { background: none; border: none; font-size: 20px; color: var(--g500); cursor: pointer; padding: 0 4px; line-height: 1; }
    .drawer-stats { font-size: 12px; color: var(--g500); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .drawer-stat strong { color: var(--black); }
    .drawer-controls { display: flex; gap: 8px; margin-top: 10px; }
    .drawer-btn { padding: 5px 12px; border: 1.5px solid var(--g200); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; background: #fff; color: var(--g700); transition: all 0.12s; }
    .drawer-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .drawer-list { overflow-y: auto; flex: 1; }
    .acct-item { border-bottom: 1px solid var(--g100); padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
    .acct-item:hover { background: var(--g50); }
    .acct-item:last-child { border-bottom: none; }
    .acct-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .acct-name { font-size: 14px; font-weight: 600; color: var(--black); flex: 1; }
    .acct-row2 { font-size: 12px; color: var(--g500); display: flex; gap: 10px; flex-wrap: wrap; }
    .acct-detail { font-size: 12px; color: var(--g700); margin-top: 6px; display: none; line-height: 1.7; }
    .acct-item.expanded .acct-detail { display: block; }
    .acct-detail-row { display: flex; gap: 6px; }
    .acct-detail-lbl { color: var(--g500); min-width: 80px; flex-shrink: 0; }
    .drawer-loading { text-align: center; padding: 30px; font-size: 13px; color: var(--g500); }

    /* ── Toast ───────────────────────────────────────────── */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--black); color: white; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 600; transition: transform 0.25s; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    #today-anchor { scroll-margin-top: 70px; }

    /* ── Dark mode ───────────────────────────────────────── */
    body.dark { --black: #f0f0f0; --black2: #1e1e1e; --g50: #141414; --g100: #222; --g200: #2e2e2e; --g300: #444; --g500: #888; --g700: #bbb; background: #0f0f0f; }
    body.dark .hdr { background: #0a0a0a; border-bottom-color: #222; }
    body.dark .day { background: #1a1a1a; border-color: #2a2a2a; }
    body.dark .day.is-today { border-color: var(--orange); }
    body.dark .day-hdr { background: #222; border-bottom-color: #2a2a2a; }
    body.dark .day-name { color: #f0f0f0; }
    body.dark .sched-table tbody tr:hover { background: #222; }
    body.dark .sched-table td { border-right-color: rgba(255,255,255,0.04); }
    body.dark .sched-table tbody tr { border-bottom-color: rgba(255,255,255,0.04); }
    body.dark .td-name { color: #f0f0f0; }
    body.dark .drawer { background: #1a1a1a; }
    body.dark .drawer-title { color: #f0f0f0; }
    body.dark .drawer-hdr { border-bottom-color: #2a2a2a; }
    body.dark .acct-item { border-bottom-color: #2a2a2a; }
    body.dark .acct-item:hover { background: #222; }
    body.dark .acct-name { color: #f0f0f0; }
    body.dark .acct-detail { color: #ccc; }
    body.dark .drawer-btn { background: #222; border-color: #333; color: #ccc; }
    body.dark .drawer-btn.active { background: var(--orange); border-color: var(--orange); color: #111; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo-circle">N</div>
    <div class="logo-text"><span>NEXT</span>LINK</div>
    <div class="subtitle" id="cal-subtitle">Install Schedule</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn rep-btn" id="repBtn" onclick="openDrawer()">My Accounts</button>
    <button class="hbtn" id="darkBtn" onclick="toggleDark()">Dark</button>
    <button class="hbtn" onclick="scrollToToday()">Today</button>
  </div>
</div>

<div class="wrap" id="cal-wrap">
  <div class="loading-msg" id="loading-msg">Loading installs…</div>
</div>

<!-- Accounts Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="drawer-hdr">
      <div class="drawer-title">
        <span id="drawer-title-text">My Accounts</span>
        <button class="drawer-close" onclick="closeDrawer()">&times;</button>
      </div>
      <div class="drawer-stats" id="drawer-stats"></div>
      <div class="drawer-controls">
        <button class="drawer-btn active" id="btn-all" onclick="filterDrawer('all')">All</button>
        <button class="drawer-btn" id="btn-installed" onclick="filterDrawer('Installed')">Installed</button>
        <button class="drawer-btn" id="btn-scheduled" onclick="filterDrawer('Scheduled')">Scheduled</button>
        <button class="drawer-btn" id="btn-cancelled" onclick="filterDrawer('Cancelled')">Cancelled</button>
        <button class="drawer-btn" id="btn-expand" onclick="toggleExpandAll()">Show More</button>
      </div>
    </div>
    <div class="drawer-list" id="drawer-list">
      <div class="drawer-loading">Loading…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRtaW6dBF8JHdUhnTBvpLBUUC9Gedw-4jeDEkgBuKv_M_t-kojomJY61Yo9RrHQbE3/exec';

const REPS = {
  'logan':  'Logan McLean',
  'brycen': 'Brycen Perkins',
  'sami':   'Sami Layadi',
  'connor': 'Connor McLean',
  'jacob':  'Jacob Denver'
};

const REP_INITIALS = {
  'Logan McLean':   'LM',
  'Brycen Perkins': 'BP',
  'Sami Layadi':    'SL',
  'Connor McLean':  'CM',
  'Jacob Denver':   'JD'
};

const STATUS_CLASS = {
  'Installed':  'badge-installed',
  'Scheduled':  'badge-scheduled',
  'Cancelled':  'badge-cancelled',
  'Failed':     'badge-failed',
  'M.I.A.':    'badge-mia',
  'Follow Up':  'badge-followup',
  'Pending':    'badge-pending',
};

const slug    = (window.location.pathname.split('/').filter(Boolean)[0] || 'logan').toLowerCase();
const repName = REPS[slug] || 'Logan McLean';
const repFirst = repName.split(' ')[0];

document.getElementById('cal-subtitle').textContent = repFirst + "'s Install Schedule";
document.getElementById('repBtn').textContent = repFirst + "'s Accounts";
document.getElementById('drawer-title-text').textContent = repFirst + "'s Accounts";

const DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var _allData    = [];  // all rows for this rep
var _drawerFilter = 'all';
var _expandAll  = false;

// ── Date helpers ─────────────────────────────────────────
function today0() { var d = new Date(); d.setHours(0,0,0,0); return d; }
function fmtKey(d) {
  var m = String(d.getMonth()+1); if(m.length<2) m='0'+m;
  var dd = String(d.getDate()); if(dd.length<2) dd='0'+dd;
  return d.getFullYear()+'-'+m+'-'+dd;
}
function addD(d,n) { var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(val) {
  if (!val) return null;
  var d = new Date(val);
  return isNaN(d.getTime()) ? null : d;
}
function fmtShort(d) {
  if (!d) return '—';
  return MN[d.getMonth()] + '-' + d.getDate();
}
function fmtFull(d) {
  if (!d) return '—';
  var day = d.getDate();
  var suf = ['th','st','nd','rd'][day%100>10&&day%100<14?0:day%10]||'th';
  return MONTHS_FULL[d.getMonth()] + ' ' + day + suf + ', ' + d.getFullYear();
}

// ── Status badge ─────────────────────────────────────────
function badge(status) {
  var cls = STATUS_CLASS[status] || 'badge-pending';
  return '<span class="badge ' + cls + '">' + (status || '—') + '</span>';
}

// ── Fetch & render ────────────────────────────────────────
function init() {
  // Dark mode
  if (localStorage.getItem('calDark') === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkBtn').textContent = 'Light';
  }

  fetch(SCRIPT_URL)
    .then(function(r){ return r.json(); })
    .then(function(json){
      // Filter to this rep
      _allData = (json.data || []).filter(function(row){
        return (row['Rep Name']||'').trim() === repName;
      });
      renderCalendar();
      setTimeout(scrollToToday, 100);
    })
    .catch(function(e){
      document.getElementById('loading-msg').textContent = 'Failed to load data. Check Apps Script deployment.';
      console.error(e);
    });
}

function renderCalendar() {
  var wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '';

  var td = today0();

  // Build a map: dateKey → [rows]
  var byDate = {};
  _allData.forEach(function(row) {
    var d = parseDate(row['Install Date']);
    if (!d) return;
    var key = fmtKey(d);
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(row);
  });

  // Show -7 days to +90 days
  var start = addD(td, -7);
  var end   = addD(td, 90);
  var cur   = new Date(start);

  while (cur <= end) {
    var key     = fmtKey(cur);
    var rows    = byDate[key] || [];
    var isToday = fmtKey(cur) === fmtKey(td);
    var isPast  = cur < td && !isToday;
    var isEmpty = rows.length === 0;

    // Skip empty past days
    if (isPast && isEmpty) { cur = addD(cur, 1); continue; }

    var div = document.createElement('div');
    div.className = 'day' + (isToday ? ' is-today' : '') + (isPast ? ' is-past' : '') + (isEmpty ? ' is-empty' : '') + (!isPast && isEmpty ? ' is-future' : '');
    if (isToday) div.id = 'today-anchor';

    var countHtml = rows.length ? '<span class="day-count">' + rows.length + ' install' + (rows.length!==1?'s':'') + '</span>' : '';

    var tableHtml = '';
    if (rows.length) {
      var rowsHtml = rows.map(function(r) {
        var initials = REP_INITIALS[r['Rep Name']] || '';
        var plan = (r['Plan']||'').replace('NEXT','').replace(/(\d+)/,'$1 Mbps');
        return '<tr>'
          + '<td class="td-status">' + badge(r['Status']) + '</td>'
          + '<td class="td-name">' + (r['Customer Name']||'—') + '</td>'
          + '<td class="td-plan">' + (r['Plan']||'') + '</td>'
          + '<td class="td-rep">' + initials + '</td>'
          + '</tr>';
      }).join('');
      tableHtml = '<table class="sched-table"><tbody>' + rowsHtml + '</tbody></table>';
    }

    div.innerHTML =
      '<div class="day-hdr">'
        + '<div class="day-name">' + DN[cur.getDay()] + '</div>'
        + '<div class="day-date" style="margin-left:6px;">' + MN[cur.getMonth()] + ' ' + cur.getDate() + '</div>'
        + (isToday ? '<div class="today-pill" style="margin-left:6px;">Today</div>' : '')
        + countHtml
      + '</div>'
      + tableHtml;

    wrap.appendChild(div);
    cur = addD(cur, 1);
  }
}

// ── Accounts Drawer ───────────────────────────────────────
function openDrawer() {
  document.getElementById('drawerOverlay').classList.add('open');
  renderDrawer();
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
}

function filterDrawer(f) {
  _drawerFilter = f;
  // Update button states
  ['all','installed','scheduled','cancelled'].forEach(function(k) {
    var btn = document.getElementById('btn-' + k);
    if (btn) btn.classList.toggle('active', k === f.toLowerCase() || (k==='all' && f==='all'));
  });
  renderDrawer();
}

function toggleExpandAll() {
  _expandAll = !_expandAll;
  document.getElementById('btn-expand').textContent = _expandAll ? 'Show Less' : 'Show More';
  document.getElementById('btn-expand').classList.toggle('active', _expandAll);
  renderDrawer();
}

function renderDrawer() {
  var list = document.getElementById('drawer-list');

  // Sort newest sold first
  var sorted = _allData.slice().sort(function(a, b) {
    var da = parseDate(a['Date Sold']);
    var db = parseDate(b['Date Sold']);
    return (db ? db.getTime() : 0) - (da ? da.getTime() : 0);
  });

  // Stats
  var statusCounts = {};
  sorted.forEach(function(r) {
    var s = r['Status'] || 'Unknown';
    statusCounts[s] = (statusCounts[s] || 0) + 1;
  });
  var statsHtml = '<strong>' + sorted.length + '</strong> total';
  ['Installed','Scheduled','Cancelled','Failed','M.I.A.'].forEach(function(s) {
    if (statusCounts[s]) statsHtml += ' &middot; <strong>' + statusCounts[s] + '</strong> ' + s;
  });
  document.getElementById('drawer-stats').innerHTML = statsHtml;

  // Filter
  var filtered = _drawerFilter === 'all' ? sorted : sorted.filter(function(r){
    return (r['Status']||'') === _drawerFilter;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="drawer-loading">No accounts found.</div>';
    return;
  }

  list.innerHTML = filtered.map(function(r, i) {
    var soldDate    = parseDate(r['Date Sold']);
    var installDate = parseDate(r['Install Date']);
    var expanded    = _expandAll ? ' expanded' : '';

    var detailRows = [
      ['Phone',    r['Phone'] || '—'],
      ['Email',    r['Email'] || '—'],
      ['Address',  r['Address'] || '—'],
      ['Price',    r['Price'] || '—'],
      ['Notes',    r['Notes'] || '—'],
      ['Acc ID',   r['Acc ID'] || '—'],
    ].map(function(d) {
      return '<div class="acct-detail-row"><span class="acct-detail-lbl">' + d[0] + '</span><span>' + d[1] + '</span></div>';
    }).join('');

    return '<div class="acct-item' + expanded + '" onclick="toggleAcct(this)">'
      + '<div class="acct-row1">'
        + badge(r['Status'])
        + '<span class="acct-name">' + (r['Customer Name'] || '—') + '</span>'
      + '</div>'
      + '<div class="acct-row2">'
        + '<span>' + (r['Plan'] || '—') + '</span>'
        + '<span>Install: ' + fmtShort(installDate) + '</span>'
        + '<span>Sold: ' + fmtShort(soldDate) + '</span>'
        + (r['Acc ID'] ? '<span>ID: ' + r['Acc ID'] + '</span>' : '')
      + '</div>'
      + '<div class="acct-detail">' + detailRows + '</div>'
    + '</div>';
  }).join('');
}

function toggleAcct(el) {
  el.classList.toggle('expanded');
}

// ── Helpers ───────────────────────────────────────────────
function scrollToToday() {
  var el = document.getElementById('today-anchor');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDark() {
  var isDark = document.body.classList.toggle('dark');
  localStorage.setItem('calDark', isDark ? '1' : '0');
  document.getElementById('darkBtn').textContent = isDark ? 'Light' : 'Dark';
}

var tTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

init();
</script>
</body>
</html>
