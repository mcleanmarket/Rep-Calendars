<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- v32 -->
  <title>Rep Calendar</title>
  <meta name="description" content="Rep Calendar">
  <meta property="og:title" content="Rep Calendar">
  <meta property="og:description" content="Rep Calendar">
  <meta property="og:site_name" content="Rep Calendar">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:     #111111;
      --orange:    #F5A31A;
      --orange-lt: #fff8ee;
      --g50:       #f5f7fa;
      --g100:      #eaecf0;
      --g200:      #d8dde6;
      --g300:      #c0c8d5;
      --g500:      #7c8fa6;
      --g700:      #3d4f63;
      --red:       #ef4444;
      --red-lt:    #fef2f2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fafafa; color: var(--g700); min-height: 100vh; }

    /* ── Header ──────────────────────────────────────────── */
    .hdr { background: var(--black); height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo-circle { width: 32px; height: 32px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0; }
    .logo-text { font-size: 20px; font-weight: 700; color: #fff; }
    .logo-text span { color: var(--orange); }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: 2px; }
    .hdr-btns { display: flex; gap: 8px; align-items: center; }
    .hbtn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); padding: 5px 13px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .hbtn:hover { color: white; background: rgba(255,255,255,0.13); }

    /* ── Wrap ────────────────────────────────────────────── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px 16px 100px; }
    .loading-msg { text-align: center; padding: 60px; color: var(--g500); font-size: 14px; }

    /* ── Day cards ───────────────────────────────────────── */
    .day { background: white; border-radius: 10px; border: 1px solid var(--g100); overflow: hidden; margin-bottom: 8px; }
    .day.is-today { border-color: var(--orange); border-width: 2px; }
    .day.is-past  { opacity: 0.72; }
    .day.in-queue { border-color: var(--g300); border-style: dashed; }

    .day-hdr { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-bottom: 1px solid var(--g100); background: #eceef2; }
    .day-name { font-size: 14px; font-weight: 700; color: var(--black); }
    .day-date { font-size: 11px; color: var(--g500); }
    .today-pill  { background: var(--orange); color: var(--black); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .queue-pill  { background: var(--g200); color: var(--g700); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .day-right   { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .add-day-btn { background: none; border: 1px solid var(--g200); border-radius: 50%; width: 24px; height: 24px; font-size: 14px; color: var(--g200); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
    .add-day-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-lt); }

    /* ── Schedule table ──────────────────────────────────── */
    .sched-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .sched-table tbody tr { border-bottom: 1px solid rgba(0,0,0,0.04); }
    .sched-table tbody tr:last-child { border-bottom: none; }
    .sched-table tbody tr:hover { background: #fafafa; }
    .sched-table td { padding: 3px 10px; font-size: 13px; vertical-align: middle; border-right: 1px solid rgba(0,0,0,0.04); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sched-table td:last-child { border-right: none; }
    .td-status { width: 130px; }
    .td-name   { font-weight: 600; color: var(--black); }
    .td-city   { width: 110px; color: var(--g700); }
    .td-plan   { width: 110px; color: var(--g500); font-size: 12px; }
    .td-rep    { width: 38px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 400; color: var(--g500); text-align: center; }

    /* ── Status buttons ──────────────────────────────────── */
    .status-btn { padding: 3px 0; width: 100%; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px; cursor: default; }
    .sheet-table .status-btn { width: 90px; padding: 2px 0; font-size: 10px; display: inline-block; text-align: center; }
    .sheet-table thead th:nth-child(5) { min-width: 100px; }
    .sheet-table tbody td:nth-child(5) { min-width: 100px; }
    .s-booked    { background: #bbf0cd; color: #1a6e3a; }
    .s-available { background: #fde9b8; color: #9a6200; cursor: pointer; }
    .s-installed { background: #bbf0cd; color: #1a6e3a; }
    .s-scheduled { background: #bfdbfe; color: #1e40af; }
    .s-cancelled { background: #fecaca; color: #991b1b; }
    .s-failed    { background: #fed7aa; color: #9a3412; }
    .s-mia       { background: #fef08a; color: #713f12; }
    .s-followup  { background: #e9d5ff; color: #4c1d95; }
    .s-pending   { background: var(--g100); color: var(--g500); }
    .s-other     { background: var(--g100); color: var(--g500); }

    /* ── Modals ──────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(8,16,32,0.5); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.18s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: white; border-radius: 14px; padding: 24px; width: 320px; max-width: 92vw; transform: translateY(8px) scale(0.97); transition: transform 0.18s; }
    .overlay.open .modal { transform: translateY(0) scale(1); }
    .modal h3 { font-size: 15px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--g500); margin-bottom: 20px; }
    .period-btns { display: flex; gap: 10px; }
    .period-btn { flex: 1; padding: 14px 10px; border: 2px solid var(--g200); border-radius: 10px; background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-align: center; }
    .period-btn:hover { border-color: var(--orange); background: var(--orange-lt); }
    .period-btn strong { display: block; font-size: 14px; font-weight: 700; color: var(--black); }
    .period-btn span { display: block; font-size: 11px; color: var(--g500); margin-top: 2px; font-family: 'DM Mono', monospace; }
    .cancel-link { display: block; text-align: center; margin-top: 14px; font-size: 12px; color: var(--g500); cursor: pointer; }
    .cancel-link:hover { color: var(--black); }
    .mactions { display: flex; gap: 8px; margin-top: 16px; }
    .mbtn { flex: 1; padding: 9px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .mbtn-ghost  { background: var(--g100); color: var(--g700); }
    .mbtn-danger { background: var(--red); color: white; }

    /* ── Accounts Drawer ─────────────────────────────────── */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400; display: none; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 14px 14px 0 0; height: 82vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; z-index: 401; }
    .drawer-overlay.open .drawer { transform: translateY(0); }
    .drawer-hdr { padding: 14px 16px 10px; border-bottom: 1px solid var(--g100); flex-shrink: 0; }
    .drawer-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .drawer-title { font-size: 15px; font-weight: 700; color: var(--black); }
    .drawer-close { background: none; border: none; font-size: 20px; color: var(--g500); cursor: pointer; line-height: 1; }
    .drawer-tabs { display: flex; gap: 6px; }
    .dtab { padding: 5px 14px; border: 1.5px solid var(--g200); border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; background: #fff; color: var(--g700); transition: all 0.12s; }
    .dtab.on { background: var(--black); border-color: var(--black); color: #fff; }
    .drawer-body { overflow-y: auto; flex: 1; }
    /* Dashboard */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
    .dash-card { background: var(--g50); border-radius: 10px; padding: 14px 16px; }
    .dash-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--g500); margin-bottom: 10px; }
    .dash-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
    .dash-stat-row span:first-child { color: var(--g700); }
    .dash-stat-row strong { font-size: 15px; font-weight: 700; }
    .dash-stat-row.installed strong { color: #166534; }
    .dash-stat-row.scheduled strong { color: #1e40af; }
    .dash-stat-row.cancelled strong { color: #991b1b; }
    .dash-stat-row.failed strong { color: #9a3412; }
    .dash-stat-row.mia strong { color: #854d0e; }
    .dash-stat-row.install-rate strong { color: #166534; }
    .dash-stat-row.cancel-rate strong  { color: #991b1b; }
    .dash-stat-row.fail-rate strong    { color: #4c1d95; }
    .plan-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; }
    .plan-table td { padding: 4px 0; color: var(--g700); }
    .plan-table td:last-child { text-align: right; font-weight: 600; color: var(--black); }
    /* Accounts sheet */
    .acct-filters { display: flex; gap: 6px; padding: 8px 12px; flex-wrap: wrap; border-bottom: 1px solid var(--g100); flex-shrink: 0; }
    .af-btn { padding: 3px 10px; border: 1.5px solid var(--g200); border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; background: #fff; color: var(--g500); transition: all 0.12s; white-space: nowrap; }
    .af-btn.on { background: var(--black); border-color: var(--black); color: #fff; }
    .sheet-wrap { overflow-x: auto; }
    .sheet-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 11px; }
    .sheet-table thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--g500); padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--g100); position: sticky; top: 0; background: #fff; white-space: nowrap; }
    .sheet-table tbody tr { border-bottom: 1px solid var(--g100); }
    .sheet-table tbody tr:hover { background: var(--g50); }
    .sheet-table tbody td { padding: 2px 8px; color: var(--g700); white-space: nowrap; font-size: 11px; line-height: 1.4; }
    .accounts-sheet tbody td:nth-child(2) { font-weight: 600; color: var(--black); max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
    .copy-cell { cursor: pointer; transition: color 0.1s; }

    /* Payroll table — condensed to fit mobile, 5 columns, widths locked via colgroup */
    .payroll-table { width: 100%; min-width: 0; table-layout: fixed; }
    .payroll-table th, .payroll-table td { padding: 5px 4px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .payroll-table th:nth-child(1), .payroll-table td:nth-child(1) { font-weight: 600; color: var(--black); padding-left: 8px; }
    .payroll-table th:nth-child(5), .payroll-table td:nth-child(5) { padding-right: 8px; }
    .payroll-table .status-btn { font-size: 9px; padding: 2px 0; width: 100% !important; }
    /* Paid badge — same light-bg/dark-text style as Status pills, consistent in both themes */
    .payroll-table .status-btn { width: 100%; }
    .paid-badge { display: block; width: 100%; box-sizing: border-box; padding: 2px 0; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.3px; text-align: center; }
    .paid-yes { background: #bbf0cd; color: #1a6e3a; }
    .paid-no  { background: #fed7aa; color: #9a3412; }
    .copy-cell:hover { color: var(--black); }
    .drawer-empty { text-align: center; padding: 30px; color: var(--g500); font-size: 13px; }

    /* ── Toast ───────────────────────────────────────────── */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #111 !important; color: #fff !important; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 600; transition: transform 0.25s; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    #today-anchor { scroll-margin-top: 70px; }

    /* ── Dark mode ───────────────────────────────────────── */
    body.dark { --black: #f0f0f0; --g50: #141414; --g100: #222; --g200: #2e2e2e; --g300: #444; --g500: #888; --g700: #bbb; background: #0f0f0f; }
    body.dark .hdr { background: #0a0a0a; border-bottom-color: #222; }
    body.dark .day { background: #1a1a1a; border-color: #2a2a2a; }
    body.dark .day.is-today { border-color: var(--orange); }
    body.dark .day.in-queue { border-color: #3a3a3a; }
    body.dark .day-hdr { background: #222; border-bottom-color: #2a2a2a; }
    body.dark .day-name { color: #f0f0f0; }
    body.dark .sched-table tbody tr:hover { background: #222; }
    body.dark .sched-table td { border-right-color: rgba(255,255,255,0.04); }
    body.dark .sched-table tbody tr { border-bottom-color: rgba(255,255,255,0.04); }
    body.dark .td-name { color: #f0f0f0; }
    body.dark .td-city { color: #aaa; }
    body.dark .td-plan { color: #777; }
    body.dark .td-rep  { color: #666; }
    body.dark .modal { background: #1a1a1a; }
    body.dark .modal h3 { color: #f0f0f0; }
    body.dark .period-btn { background: #222; border-color: #333; }
    body.dark .period-btn strong { color: #f0f0f0; }
    body.dark .mbtn-ghost { background: #2a2a2a; color: #ccc; }
    body.dark .drawer { background: #1a1a1a; }
    body.dark .drawer-title { color: #f0f0f0; }
    body.dark .drawer-hdr { border-bottom-color: #2a2a2a; }
    body.dark .dtab { background: #222; border-color: #333; color: #ccc; }
    body.dark .dtab.on { background: #f0f0f0; border-color: #f0f0f0; color: #111; }
    body.dark .dash-card { background: #222; }
    body.dark .dash-stat-row span:first-child { color: #aaa; }
    body.dark .plan-table td { color: #aaa; }
    body.dark .plan-table td:last-child { color: #f0f0f0; }
    body.dark .af-btn { background: #222; border-color: #333; color: #888; }
    body.dark .af-btn.on { background: #f0f0f0; border-color: #f0f0f0; color: #111; }
    body.dark .sheet-table thead th { background: #1a1a1a; border-bottom-color: #2a2a2a; }
    body.dark .sheet-table tbody tr { border-bottom-color: #2a2a2a; }
    body.dark .sheet-table tbody tr:hover { background: #222; }
    body.dark .sheet-table tbody td { color: #aaa; }
    body.dark .sheet-table tbody td:nth-child(2) { color: #f0f0f0; }
    body.dark .acct-filters { border-bottom-color: #2a2a2a; }
    /* Dark-mode status & paid badge colors — saturated bg, light text */
    body.dark .s-booked,
    body.dark .s-installed { background: #14532d; color: #86efac; }
    body.dark .s-scheduled { background: #1e3a8a; color: #93c5fd; }
    body.dark .s-cancelled { background: #7f1d1d; color: #fca5a5; }
    body.dark .s-failed    { background: #7c2d12; color: #fdba74; }
    body.dark .s-mia       { background: #713f12; color: #fde047; }
    body.dark .s-followup  { background: #4c1d95; color: #d8b4fe; }
    body.dark .s-other     { background: #2a2a2a; color: #999; }
    body.dark .paid-yes { background: #14532d; color: #86efac; }
    body.dark .paid-no  { background: #7c2d12; color: #fdba74; }
    body.city-hidden .td-city { display: none; }
    body.city-hidden .td-plan { width: 220px; }

    @media (max-width: 500px) {
      .hdr { padding: 0 12px; }
      .hdr-btns { gap: 5px; }
      .hbtn { padding: 4px 9px; font-size: 11px; }
      .mode-btn { padding: 4px 9px; font-size: 11px; }
      .logo-text { font-size: 17px; }
      .logo-circle { width: 28px; height: 28px; font-size: 14px; }
      .td-status { width: 90px; }
      .td-city   { width: 80px; }
      .td-plan   { display: none; }
      .wrap { padding: 12px 10px 80px; }
      .day-hdr { padding: 5px 10px; }
      .sched-table td { padding: 4px 7px; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo-circle">N</div>
    <div class="logo-text"><span>NEXT</span>LINK</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn" id="modeBtn" onclick="cycleMode()">Schedule</button>
    <button class="hbtn" id="darkBtn" onclick="toggleDark()">Dark</button>
    <button class="hbtn" id="syncBtn" onclick="syncData()">Sync</button>
    <button class="hbtn" id="cityBtn" onclick="toggleCity()">City</button>
    <button class="hbtn" id="acctBtn" onclick="openDrawer()">Logan</button>
  </div>
</div>

<div class="wrap" id="cal-wrap">
  <div class="loading-msg" id="loading-msg">Loading…</div>
</div>

<!-- Add Slot Modal -->
<div class="overlay" id="addModal">
  <div class="modal">
    <h3>Add Open Slot</h3>
    <div class="modal-sub" id="addSub"></div>
    <div class="period-btns">
      <button class="period-btn" onclick="submitAdd('AM')"><strong>Morning</strong><span>8:00–12:00</span></button>
      <button class="period-btn" onclick="submitAdd('PM')"><strong>Afternoon</strong><span>1:00–5:00</span></button>
    </div>
    <div class="cancel-link" onclick="closeModal('addModal')">Cancel</div>
  </div>
</div>

<!-- Remove Slot Modal -->
<div class="overlay" id="removeModal">
  <div class="modal">
    <h3>Remove Slot?</h3>
    <div class="modal-sub" id="removeSub"></div>
    <div class="mactions">
      <button class="mbtn mbtn-ghost"  onclick="closeModal('removeModal')">Keep It</button>
      <button class="mbtn mbtn-danger" onclick="confirmRemove()">Remove</button>
    </div>
  </div>
</div>

<!-- Accounts Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="drawer-hdr">
      <div class="drawer-title-row">
        <div class="drawer-title" id="drawer-title">Accounts</div>
        <button class="drawer-close" onclick="closeDrawer()">&times;</button>
      </div>
      <div class="drawer-tabs">
        <button class="dtab on" id="tab-dashboard" onclick="setDrawerView('dashboard')">Dashboard</button>
        <button class="dtab"    id="tab-accounts"  onclick="setDrawerView('accounts')">Accounts</button>
        <button class="dtab"    id="tab-payroll"   onclick="setDrawerView('payroll')">Payroll</button>
      </div>
    </div>
    <div id="acct-filters" class="acct-filters" style="display:none;">
      <button class="af-btn on" id="af-all"       onclick="setAcctFilter('all')">All</button>
      <button class="af-btn"    id="af-installed"  onclick="setAcctFilter('Installed')">Installed</button>
      <button class="af-btn"    id="af-scheduled"  onclick="setAcctFilter('Scheduled')">Scheduled</button>
      <button class="af-btn"    id="af-cancelled"  onclick="setAcctFilter('Cancelled')">Cancelled</button>
      <button class="af-btn"    id="af-failed"     onclick="setAcctFilter('Failed')">Failed</button>
      <button class="af-btn"    id="af-mia"        onclick="setAcctFilter('M.I.A.')">M.I.A.</button>
      <button class="af-btn"    id="af-followup"   onclick="setAcctFilter('Follow Up')">Follow Up</button>
    </div>
    <div id="payroll-filters" class="acct-filters" style="display:none;">
      <button class="af-btn on" id="pf-all"    onclick="setPayrollFilter('all')">All</button>
      <button class="af-btn"    id="pf-paid"    onclick="setPayrollFilter('paid')">Paid</button>
      <button class="af-btn"    id="pf-pending" onclick="setPayrollFilter('pending')">Pending</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRtaW6dBF8JHdUhnTBvpLBUUC9Gedw-4jeDEkgBuKv_M_t-kojomJY61Yo9RrHQbE3/exec';

var REPS = { 'logan':'Logan McLean','brycen':'Brycen Perkins','sami':'Sami Layadi','connor':'Connor McLean','jacob':'Jacob Denver' };
var REP_INITIALS = { 'Logan McLean':'LM','Brycen Perkins':'BP','Sami Layadi':'SL','Connor McLean':'CM','Jacob Denver':'JD' };
var STATUS_CLASS = { 'Installed':'s-installed','Scheduled':'s-scheduled','Cancelled':'s-cancelled','Failed':'s-failed','M.I.A.':'s-mia','Follow Up':'s-followup','Pending':'s-pending' };

var slug     = (window.location.pathname.split('/').filter(Boolean)[0] || 'logan').toLowerCase();
var repName  = REPS[slug] || 'Logan McLean';
var repFirst = repName.split(' ')[0];
var _mode    = 'schedule'; // 'schedule' | 'myschedule' | 'track'

document.getElementById('drawer-title').textContent  = repFirst + "'s Accounts";
document.getElementById('acctBtn').textContent        = repFirst;

var DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MFULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var LS_SLOTS = 'rep_cal_slots_' + slug;

var _allRows = [];
var _repRows = [];
var _slots   = {};  // { 'YYYY-MM-DD': { AM: 1, PM: 2 } }
var _filter  = 'all';
var _expanded = false;
var _pendingAdd = null;
var _pendingRemove = null;

// ── Date helpers ──────────────────────────────────────────
function today0() { var d=new Date(); d.setHours(0,0,0,0); return d; }
function addD(d,n) { var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtKey(d) { var m=String(d.getMonth()+1); if(m.length<2)m='0'+m; var dd=String(d.getDate()); if(dd.length<2)dd='0'+dd; return d.getFullYear()+'-'+m+'-'+dd; }
function parseDate(val) { if(!val) return null; var d=new Date(val); return isNaN(d.getTime())?null:d; }
function fmtShort(d) { if(!d) return '—'; return MN[d.getMonth()]+'-'+d.getDate(); }
function extractCity(addr) { if(!addr) return ''; var p=addr.split(','); return p.length>=2?p[p.length-2].trim():addr; }
function fmtPlan(p) { var m=(p||'').match(/(\d+)/); return m?m[1]+' Mbps':(p||''); }

// ── Status button ─────────────────────────────────────────
function statusBtn(status, modeOverride) {
  var mode = modeOverride || _mode;
  if (mode === 'schedule' || mode === 'myschedule') return '<button class="status-btn s-booked">Booked</button>';
  var cls = STATUS_CLASS[status] || 's-other';
  return '<button class="status-btn ' + cls + '">' + (status||'—') + '</button>';
}

// ── Slots (localStorage) ──────────────────────────────────
function loadSlots() {
  try { var s = localStorage.getItem(LS_SLOTS); _slots = s ? JSON.parse(s) : {}; } catch(e) { _slots = {}; }
}
function saveSlots() {
  try { localStorage.setItem(LS_SLOTS, JSON.stringify(_slots)); } catch(e) {}
}
function getSlots(key, period) { return ((_slots[key]||{})[period])||0; }

// ── Fetch ─────────────────────────────────────────────────
var LS_DATA = 'rep_cal_data_v1';

function fetchData() {
  return fetch(SCRIPT_URL)
    .then(function(r){ return r.json(); })
    .then(function(json){
      _allRows = json.data || [];
      _repRows = _allRows.filter(function(r){ return (r['Rep Name']||'').trim()===repName; });
      try { localStorage.setItem(LS_DATA, JSON.stringify({ts: Date.now(), data: json.data})); } catch(e){}
      renderCalendar();
      setTimeout(scrollToToday, 100);
    })
    .catch(function(e){
      var el=document.getElementById('loading-msg');
      if(el) el.textContent='Failed to load. Check Apps Script.';
      console.error(e);
    });
}
function syncData() {
  var btn=document.getElementById('syncBtn');
  btn.textContent='Syncing…'; btn.style.opacity='0.5';
  fetchData().then(function(){ btn.textContent='Sync'; btn.style.opacity='1'; showToast('Synced'); });
}

// ── Mode toggle ───────────────────────────────────────────
var MODE_CYCLE = ['schedule', 'myschedule', 'track'];
var MODE_LABELS = { 'schedule': 'Schedule', 'myschedule': 'My Schedule', 'track': 'Track' };

function cycleMode() {
  var idx = MODE_CYCLE.indexOf(_mode);
  _mode = MODE_CYCLE[(idx + 1) % MODE_CYCLE.length];
  document.getElementById('modeBtn').textContent = MODE_LABELS[_mode];
  renderCalendar();
  setTimeout(scrollToToday, 50);
}

function setMode(m) {
  _mode = m;
  document.getElementById('modeBtn').textContent = MODE_LABELS[m];
  renderCalendar();
  setTimeout(scrollToToday, 50);
}

// ── Calendar render ───────────────────────────────────────
function renderCalendar() {
  var wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '';
  var td = today0();
  var rows = (_mode==='track' || _mode==='myschedule') ? _repRows : _allRows;

  // Group by install date (exclude Pending)
  var byDate = {};
  rows.forEach(function(row) {
    if ((row['Status']||'') === 'Pending') return;
    var d = parseDate(row['Install Date']);
    if (!d) return;
    var key = fmtKey(d);
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(row);
  });

  // ── In Queue — built here, inserted just before today ──
  // Schedule = all reps unscheduled; My Schedule & Track = this rep only
  var queueSource = (_mode === 'schedule') ? _allRows : _repRows;
  var queued = queueSource.filter(function(r){ return !parseDate(r['Install Date']) && (r['Status']||'') !== 'Pending'; });
  var queueBlock = null;
  var queueInserted = false;
  if (queued.length) {
    queueBlock = document.createElement('div');
    queueBlock.className = 'day in-queue';
    var qRows = queued.map(function(r){
      var ini = REP_INITIALS[r['Rep Name']]||'';
      return '<tr>'
        +'<td class="td-status">'+statusBtn(r['Status'])+'</td>'
        +'<td class="td-name">'+(r['Customer Name']||'—')+'</td>'
        +'<td class="td-city">'+extractCity(r['Address'])+'</td>'
        +'<td class="td-plan">'+fmtPlan(r['Plan'])+'</td>'
        +'<td class="td-rep">'+ini+'</td>'
        +'</tr>';
    }).join('');
    queueBlock.innerHTML=
      '<div class="day-hdr">'
        +'<div class="day-name">In Queue</div>'
        +'<div class="queue-pill" style="margin-left:8px;">Ready for Install</div>'
        +'<span class="day-right" style="font-size:11px;color:var(--g500);font-family:\'DM Mono\',monospace;">'+queued.length+' account'+(queued.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<table class="sched-table"><tbody>'+qRows+'</tbody></table>';
  }

  // ── Days ──────────────────────────────────────────────
  var start = addD(td,-7), end = addD(td,90), cur = new Date(start);
  while (cur <= end) {
    var key     = fmtKey(cur);
    var dayRows = byDate[key] || [];
    var isToday = fmtKey(cur)===fmtKey(td);
    var isPast  = cur<td && !isToday;
    var isEmpty = dayRows.length===0;

    // Schedule mode: also check slots
    var amSlots = _mode==='schedule' ? getSlots(key,'AM') : 0;
    var pmSlots = _mode==='schedule' ? getSlots(key,'PM') : 0;
    var hasSlots = amSlots+pmSlots > 0;

    if (isPast && isEmpty && !hasSlots) { cur=addD(cur,1); continue; }

    // Insert In Queue block right before today
    if (isToday && !queueInserted && queueBlock) {
      wrap.appendChild(queueBlock);
      queueInserted = true;
    }

    var div = document.createElement('div');
    div.className = 'day'+(isToday?' is-today':'')+(isPast?' is-past':'');
    if (isToday) div.id = 'today-anchor';

    var addBtn = (!isPast && _mode==='schedule')
      ? '<button class="add-day-btn" onclick="openAdd(\''+key+'\',\''+MN[cur.getMonth()]+' '+cur.getDate()+'\')">+</button>'
      : '';

    // Build rows
    var tbody = '';

    // Open slots (schedule mode)
    if (_mode==='schedule') {
      for(var a=0;a<amSlots;a++) tbody+=slotRow(key,'AM','8–12 am');
      for(var p=0;p<pmSlots;p++) tbody+=slotRow(key,'PM','1–5 pm');
    }

    // Booked rows
    dayRows.forEach(function(r){
      var ini = REP_INITIALS[r['Rep Name']]||'';
      tbody+='<tr>'
        +'<td class="td-status">'+statusBtn(r['Status'])+'</td>'
        +'<td class="td-name">'+(r['Customer Name']||'—')+'</td>'
        +'<td class="td-city">'+extractCity(r['Address'])+'</td>'
        +'<td class="td-plan">'+fmtPlan(r['Plan'])+'</td>'
        +'<td class="td-rep">'+ini+'</td>'
        +'</tr>';
    });

    div.innerHTML=
      '<div class="day-hdr">'
        +'<div class="day-name">'+DN[cur.getDay()]+'</div>'
        +'<div class="day-date" style="margin-left:6px;">'+MN[cur.getMonth()]+' '+cur.getDate()+'</div>'
        +(isToday?'<div class="today-pill" style="margin-left:6px;">Today</div>':'')
        +'<div class="day-right">'+addBtn+'</div>'
      +'</div>'
      +(tbody?'<table class="sched-table"><tbody>'+tbody+'</tbody></table>':'');

    wrap.appendChild(div);
    cur=addD(cur,1);
  }
}

function slotRow(key, period, label) {
  var ds = key;
  return '<tr class="open-row">'
    +'<td class="td-status"><button class="status-btn s-available">Available</button></td>'
    +'<td class="td-name" style="color:var(--g300);font-style:italic;font-weight:400;">—</td>'
    +'<td class="td-city"></td>'
    +'<td class="td-plan" style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--g500);">'+label+'</td>'
    +'<td class="td-rep"><button style="background:none;border:none;cursor:pointer;color:var(--g300);font-size:12px;padding:3px 5px;" onclick="openRemove(\''+ds+'\',\''+period+'\',\''+label+'\')">&minus;</button></td>'
    +'</tr>';
}

// ── Slot modals ───────────────────────────────────────────
function openAdd(key, label) {
  _pendingAdd = key;
  document.getElementById('addSub').textContent = label;
  openModal('addModal');
}
function submitAdd(period) {
  if (!_pendingAdd) return;
  if (!_slots[_pendingAdd]) _slots[_pendingAdd] = {};
  _slots[_pendingAdd][period] = (_slots[_pendingAdd][period]||0)+1;
  saveSlots(); closeModal('addModal'); renderCalendar();
  showToast('Slot added');
}
function openRemove(key, period, label) {
  _pendingRemove = {key:key, period:period};
  document.getElementById('removeSub').textContent = 'Remove the '+label+' open slot?';
  openModal('removeModal');
}
function confirmRemove() {
  if (!_pendingRemove) return;
  var k=_pendingRemove.key, p=_pendingRemove.period;
  if (_slots[k] && _slots[k][p]) {
    _slots[k][p] = Math.max(0, _slots[k][p]-1);
    if (!_slots[k][p]) delete _slots[k][p];
    if (!Object.keys(_slots[k]).length) delete _slots[k];
  }
  saveSlots(); closeModal('removeModal'); renderCalendar();
  showToast('Slot removed');
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click',function(e){ if(e.target===el) el.classList.remove('open'); });
});

// ── Accounts Drawer ───────────────────────────────────────
var _drawerView = 'dashboard';
var _acctFilter = ['all']; // array of selected statuses, or ['all']
var _payrollFilter = 'all';

function openDrawer() {
  document.getElementById('drawerOverlay').classList.add('open');
  renderDrawer();
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
}
function setDrawerView(v) {
  _drawerView = v;
  document.getElementById('tab-dashboard').classList.toggle('on', v==='dashboard');
  document.getElementById('tab-accounts').classList.toggle('on', v==='accounts');
  document.getElementById('tab-payroll').classList.toggle('on', v==='payroll');
  document.getElementById('acct-filters').style.display = v==='accounts' ? 'flex' : 'none';
  document.getElementById('payroll-filters').style.display = v==='payroll' ? 'flex' : 'none';
  renderDrawer();
}
var ACCT_FILTER_MAP = { 'all':'all','Installed':'installed','Scheduled':'scheduled','Cancelled':'cancelled','Failed':'failed','M.I.A.':'mia','Follow Up':'followup' };
function setAcctFilter(f) {
  if (f === 'all') {
    _acctFilter = ['all'];
  } else {
    var idx = _acctFilter.indexOf('all');
    if (idx > -1) _acctFilter.splice(idx, 1);
    var pos = _acctFilter.indexOf(f);
    if (pos > -1) { _acctFilter.splice(pos, 1); }
    else { _acctFilter.push(f); }
    if (_acctFilter.length === 0) _acctFilter = ['all'];
  }
  Object.keys(ACCT_FILTER_MAP).forEach(function(k){
    var btn = document.getElementById('af-'+ACCT_FILTER_MAP[k]);
    if (btn) btn.classList.toggle('on', _acctFilter.indexOf(k) > -1);
  });
  renderDrawer();
}
function setPayrollFilter(f) {
  _payrollFilter = f;
  ['all','paid','pending'].forEach(function(k){
    var btn = document.getElementById('pf-'+k);
    if (btn) btn.classList.toggle('on', k===f);
  });
  renderDrawer();
}
function renderDrawer() {
  if (_drawerView==='dashboard') renderDashboard();
  else if (_drawerView==='accounts') renderAccounts();
  else renderPayroll();
}
function renderDashboard() {
  var body = document.getElementById('drawer-body');
  if (!body) return;
  var counts = {};
  _repRows.forEach(function(r){ var s=r['Status']||'Unknown'; counts[s]=(counts[s]||0)+1; });
  var total=_repRows.length, installed=counts['Installed']||0, scheduled=counts['Scheduled']||0,
      cancelled=counts['Cancelled']||0, failed=counts['Failed']||0, mia=counts['M.I.A.']||0,
      followup=counts['Follow Up']||0, pending=counts['Pending']||0;
  // Install rate: Installed / (Installed + FollowUp + Failed + Cancelled + MIA)
  var installDenom = installed + followup + failed + cancelled + mia;
  var installRate  = installDenom>0 ? Math.round(installed/installDenom*100) : 0;
  // Cancel rate: Cancelled / everything except Pending
  var cancelDenom  = total - pending;
  var cancelRate   = cancelDenom>0 ? Math.round(cancelled/cancelDenom*100) : 0;
  // Fail rate: Failed / (Installed + Failed) — of accounts that reached install, % that failed
  var failDenom    = installed + failed;
  var failRate     = failDenom>0 ? Math.round(failed/failDenom*100) : 0;
  var planCounts = {};
  _repRows.forEach(function(r){ var p=r['Plan']||'—'; planCounts[p]=(planCounts[p]||0)+1; });
  var planRows = Object.keys(planCounts).sort().map(function(p){
    var pct=total>0?Math.round(planCounts[p]/total*100):0;
    return '<tr><td>'+p+'</td><td>'+planCounts[p]+'</td><td style="text-align:right;color:var(--g500);">'+pct+'%</td></tr>';
  }).join('');
  body.innerHTML =
    '<div class="dash-grid">'
    // ── Row 1: Top Days | Top Weeks ───────────────────────
    +(function(){
      // Group by Date Sold (non-pending)
      var daySales = {}, weekSales = {};
      _repRows.forEach(function(r){
        if ((r['Status']||'') === 'Pending') return;
        var d = parseDate(r['Date Sold']);
        if (!d) return;
        // Day key
        var dk = fmtShort(d);
        if (dk && dk !== '—') daySales[dk] = (daySales[dk]||0) + 1;
        // Week key — find Monday of the week
        var day = d.getDay(); // 0=Sun
        var diff = (day === 0) ? -6 : 1 - day;
        var mon = new Date(d); mon.setDate(d.getDate() + diff);
        var wk = fmtShort(mon);
        if (wk && wk !== '—') weekSales[wk] = (weekSales[wk]||0) + 1;
      });

      var medals = ['🥇','🥈','🥉'];
      var mColors = ['#b8860b','#6b7280','#92400e'];

      function topCard(title, counts) {
        var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
        var rows = sorted.slice(0,3).map(function(k,i){
          return '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:'+(i<2?'1px solid var(--g100)':'none')+'">'
            +'<span style="font-size:16px;line-height:1;flex-shrink:0;">'+medals[i]+'</span>'
            +'<span style="flex:1;font-size:12px;font-weight:600;color:var(--black);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+k+'</span>'
            +'<span style="font-size:13px;font-weight:700;color:'+mColors[i]+';white-space:nowrap;">'+counts[k]+'</span>'
            +'</div>';
        }).join('');
        return '<div class="dash-card"><div class="dash-card-title">'+title+'</div>'
          +(rows||'<div style="color:var(--g500);font-size:12px;">No data</div>')
          +'</div>';
      }

      return topCard('Top Days', daySales) + topCard('Top Weeks', weekSales);
    })()
    +'<div class="dash-card"><div class="dash-card-title">Summary</div>'
      +'<div class="dash-stat-row"><span>Total Sold</span><strong>'+total+'</strong></div>'
      +'<div class="dash-stat-row installed"><span>Installed</span><strong>'+installed+'</strong></div>'
      +'<div class="dash-stat-row scheduled"><span>Scheduled</span><strong>'+scheduled+'</strong></div>'
      +'<div class="dash-stat-row cancelled"><span>Cancelled</span><strong>'+cancelled+'</strong></div>'
      +'<div class="dash-stat-row failed"><span>Failed</span><strong>'+failed+'</strong></div>'
      +'<div class="dash-stat-row mia"><span>M.I.A.</span><strong>'+mia+'</strong></div>'
    +'</div>'
    +'<div class="dash-card"><div class="dash-card-title">Rates</div>'
      +'<div class="dash-stat-row install-rate"><span>Install Rate</span><strong>'+installRate+'%</strong></div>'
      +'<div class="dash-stat-row cancel-rate"><span>Cancel Rate</span><strong>'+cancelRate+'%</strong></div>'
      +'<div class="dash-stat-row fail-rate"><span>Fail Rate</span><strong>'+failRate+'%</strong></div>'
    +'</div>'
    +'<div class="dash-card"><div class="dash-card-title">Plan Mix</div>'
      +'<table class="plan-table"><tbody>'+planRows+'</tbody></table>'
    +'</div>'
    +'<div class="dash-card"><div class="dash-card-title">Daily Averages</div>'
      +(function(){
        var nonPending = _repRows.filter(function(r){ return (r['Status']||'')!=='Pending'; });
        var sellDays={}, installDays={};
        nonPending.forEach(function(r){
          var d = parseDate(r['Date Sold']);
          if (d) { var k=fmtShort(d); if(k&&k!=='—') sellDays[k]=1; }
        });
        _repRows.forEach(function(r){
          if ((r['Status']||'')==='Installed') {
            var d = parseDate(r['Install Date']);
            if (d) { var k=fmtShort(d); if(k&&k!=='—') installDays[k]=1; }
          }
        });
        var totalSold      = nonPending.length;
        var totalInstalled = _repRows.filter(function(r){ return (r['Status']||'')==='Installed'; }).length;
        var totalCancelled = _repRows.filter(function(r){ return (r['Status']||'')==='Cancelled'; }).length;
        var dSell    = Object.keys(sellDays).length    || 1;
        var dInstall = Object.keys(installDays).length || 1;
        var avgSoldDay   = (totalSold/dSell).toFixed(1);
        var avgInstDay   = (totalInstalled/dInstall).toFixed(1);
        var avgCancelDay = (totalCancelled/dSell).toFixed(1);
        function row(label, val, color) {
          return '<div class="dash-stat-row"><span>'+label+'</span><span style="font-size:15px;font-weight:400;color:'+color+';">'+val+'</span></div>';
        }
        return row('Sold',      avgSoldDay,   'var(--black)')
          + row('Installed',  avgInstDay,   '#166534')
          + row('Cancelled',  avgCancelDay, '#991b1b');
      })()
    +'</div>'
    +'</div>';
}
function renderAccounts() {
  var body = document.getElementById('drawer-body');
  if (!body) return;
  var sorted = _repRows.slice().sort(function(a,b){
    return (parseDate(b['Date Sold'])||new Date(0))-(parseDate(a['Date Sold'])||new Date(0));
  });
  var shown = (_acctFilter.indexOf('all')>-1) ? sorted : sorted.filter(function(r){ return _acctFilter.indexOf(r['Status']||'') > -1; });
  if (!shown.length) { body.innerHTML='<div class="drawer-empty">No accounts.</div>'; return; }
  var rows = shown.map(function(r){
    var installDate=parseDate(r['Install Date']), soldDate=parseDate(r['Date Sold']);
    var rawPhone = (r['Phone']||'').toString().replace(/\D/g,'');
    var fmtPhone = rawPhone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3') || '—';
    var email   = r['Email']   || '—';
    var address = r['Address'] || '—';
    return '<tr>'
      +'<td>'+fmtShort(soldDate)+'</td>'
      +'<td>'+(r['Customer Name']||'—')+'</td>'
      +'<td>'+fmtShort(installDate)+'</td>'
      +'<td>'+(r['Plan']||'—')+'</td>'
      +'<td>'+statusBtn(r['Status'],'track')+'</td>'
      +'<td><span class="copy-cell" onclick="copyVal(\''+rawPhone+'\',this)" title="Copy">'+fmtPhone+'</span></td>'
      +'<td style="color:var(--g500);">'+(r['Acc ID'] ? '<span class="copy-cell" onclick="copyVal(\''+r['Acc ID']+'\',this)" title="Copy">'+r['Acc ID']+'</span>' : '—')+'</td>'
      +'<td style="color:var(--g500);"><span class="copy-cell" onclick="copyVal(\''+email.replace(/'/g,"\\'")+ '\',this)" title="Copy">'+email+'</span></td>'
      +'<td style="color:var(--g500);"><span class="copy-cell" onclick="copyVal(\''+address.replace(/'/g,"\\'")+'\',this)" title="Copy">'+address+'</span></td>'
      +'<td style="color:var(--g500);white-space:normal;min-width:180px;">'+(r['Notes']||'—')+'</td>'
      +'</tr>';
  }).join('');
  body.innerHTML =
    '<div class="sheet-wrap"><table class="sheet-table accounts-sheet">'
    +'<thead><tr><th>Sold</th><th>Name</th><th>Install</th><th>Plan</th><th>Status</th><th>Phone</th><th>Acc ID</th><th>Email</th><th>Address</th><th>Notes</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function renderPayroll() {
  var body = document.getElementById('drawer-body');
  if (!body) return;
  var installed = _repRows.filter(function(r){ return (r['Status']||'')==='Installed'; });
  if (_payrollFilter === 'paid') {
    installed = installed.filter(function(r){ return (r['Paid? Rep']||'').toString().trim().toUpperCase()==='Y'; });
  } else if (_payrollFilter === 'pending') {
    installed = installed.filter(function(r){ return (r['Paid? Rep']||'').toString().trim().toUpperCase()!=='Y'; });
  }
  var sorted = installed.slice().sort(function(a,b){
    return (parseDate(b['Install Date'])||new Date(0))-(parseDate(a['Install Date'])||new Date(0));
  });
  if (!sorted.length) { body.innerHTML='<div class="drawer-empty">No accounts.</div>'; return; }
  var rows = sorted.map(function(r){
    var installDate = parseDate(r['Install Date']);
    var paid = (r['Paid? Rep']||'').toString().trim().toUpperCase();
    var paidHtml = paid==='Y'
      ? '<span class="paid-badge paid-yes">Paid</span>'
      : '<span class="paid-badge paid-no">Pending</span>';
    return '<tr>'
      +'<td>'+(r['Customer Name']||'—')+'</td>'
      +'<td>'+fmtShort(installDate)+'</td>'
      +'<td>'+(r['Plan']||'—')+'</td>'
      +'<td>'+statusBtn(r['Status'],'track')+'</td>'
      +'<td>'+paidHtml+'</td>'
      +'</tr>';
  }).join('');
  body.innerHTML =
    '<table class="sheet-table payroll-table">'
    +'<colgroup><col style="width:22%"><col style="width:16%"><col style="width:20%"><col style="width:24%"><col style="width:18%"></colgroup>'
    +'<thead><tr><th>Name</th><th>Install</th><th>Plan</th><th>Status</th><th>Paid?</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>';
}

function copyVal(text, el) {
  if (!text || text === '—') return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ flashCell(el); }).catch(function(){ fallbackCopy(text, el); });
  } else { fallbackCopy(text, el); }
}
function fallbackCopy(text, el) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:absolute;left:-9999px;top:0;';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); flashCell(el);
}
function flashCell(el) {
  if (!el) return;
  var orig = el.style.color;
  el.style.color = '#166534';
  setTimeout(function(){ el.style.color = orig; }, 800);
  showToast('Copied');
}

function toggleCity() {
  var hidden = document.body.classList.toggle('city-hidden');
  localStorage.setItem('cityHidden', hidden ? '1' : '0');
  document.getElementById('cityBtn').style.opacity = hidden ? '0.4' : '1';
}

// ── Helpers ───────────────────────────────────────────────
function scrollToToday() { var el=document.getElementById('today-anchor'); if(el)el.scrollIntoView({behavior:'smooth',block:'start'}); }
function toggleDark() { var isDark=document.body.classList.toggle('dark'); localStorage.setItem('calDark',isDark?'1':'0'); document.getElementById('darkBtn').textContent=isDark?'Light':'Dark'; }
var tTimer;
function showToast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(tTimer); tTimer=setTimeout(function(){t.classList.remove('show');},2500); }

// ── Init ──────────────────────────────────────────────────
if(localStorage.getItem('cityHidden')==='1'){
  document.body.classList.add('city-hidden');
  document.addEventListener('DOMContentLoaded',function(){
    var b=document.getElementById('cityBtn'); if(b) b.style.opacity='0.4';
  });
}
if(localStorage.getItem('calDark')==='1'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='Light';}
loadSlots();
setMode('schedule');

// Load from cache instantly, then refresh in background
(function() {
  try {
    var cached = localStorage.getItem(LS_DATA);
    if (cached) {
      var obj = JSON.parse(cached);
      if (obj && obj.data) {
        _allRows = obj.data;
        _repRows = _allRows.filter(function(r){ return (r['Rep Name']||'').trim()===repName; });
        renderCalendar();
        setTimeout(scrollToToday, 80);
      }
    }
  } catch(e) {}
  // Always fetch fresh in background
  fetchData();
})();
</script>
